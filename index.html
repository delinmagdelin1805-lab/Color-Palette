<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Color Palette System</title>

    <!-- CSS -->

    <link rel="stylesheet"
        href="style.css">

    <!-- Google Font -->

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href=
"https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <!-- Main Container -->

    <section class="palette-system">

        <!-- Header -->

        <div class="header">

            <span class="tag">
                DESIGN SYSTEM
            </span>

            <h1>
                Color Palette System
            </h1>

            <p>
                Modern responsive color palette
                system using HTML, CSS &
                JavaScript.
            </p>

        </div>

        <!-- Palette Grid -->

        <div class="palette-grid">

            <!-- Palette Card -->

            <div class="palette-card">

                <div class="color blue"></div>

                <h3>
                    Primary Blue
                </h3>

                <span>
                    #2563EB
                </span>

            </div>

            <div class="palette-card">

                <div class="color purple"></div>

                <h3>
                    Accent Purple
                </h3>

                <span>
                    #7C3AED
                </span>

            </div>

            <div class="palette-card">

                <div class="color pink"></div>

                <h3>
                    Vibrant Pink
                </h3>

                <span>
                    #EC4899
                </span>

            </div>

            <div class="palette-card">

                <div class="color orange"></div>

                <h3>
                    Creative Orange
                </h3>

                <span>
                    #F97316
                </span>

            </div>

            <div class="palette-card">

                <div class="color green"></div>

                <h3>
                    Success Green
                </h3>

                <span>
                    #22C55E
                </span>

            </div>

            <div class="palette-card">

                <div class="color dark"></div>

                <h3>
                    Dark Theme
                </h3>

                <span>
                    #0F172A
                </span>

            </div>

        </div>

    </section>

    <!-- JavaScript -->

    <script src="script.js"></script>

</body>

</html>
